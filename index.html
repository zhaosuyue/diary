<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小乐的日记</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'SF Pro Display', -apple-system, sans-serif;
      background: #fafafa;
      color: #222;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 56px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e8e8e8;
    }
    header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.5px; color: #111; }
    header p  { font-size: 13px; color: #999; margin-top: 4px; }

    /* ── List view ── */
    #view-list { display: block; }
    .entry-card {
      display: block;
      padding: 20px 0;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: opacity .15s;
    }
    .entry-card:first-child { padding-top: 0; }
    .entry-card:active { opacity: 0.6; }
    .entry-card:hover .entry-title { color: #000; }
    .entry-date    { font-size: 12px; color: #bbb; margin-bottom: 6px; letter-spacing: 0.3px; }
    .entry-title   { font-size: 16px; font-weight: 500; color: #111; margin-bottom: 8px; line-height: 1.5; transition: color .15s; }
    .entry-summary { font-size: 14px; color: #888; line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── Detail view ── */
    #view-detail { display: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; color: #999; cursor: pointer;
      margin-bottom: 40px; transition: color .15s;
    }
    .back-btn:hover { color: #333; }
    .back-btn svg { width: 14px; height: 14px; }

    .detail-date  { font-size: 12px; color: #bbb; margin-bottom: 10px; letter-spacing: 0.3px; }
    .detail-title { font-size: 22px; font-weight: 500; color: #111; margin-bottom: 32px; line-height: 1.4; }
    .detail-body  { font-size: 15px; line-height: 1.95; color: #333; }
    .detail-body p  { margin-bottom: 18px; }
    .detail-body p:last-child { margin-bottom: 0; }
    .detail-body hr { border: none; height: 1px; background: #eee; margin: 28px 0; }

    /* ── Music Card ── */
    .music-card {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 32px;
      padding: 14px 16px 14px 14px;
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background .15s, transform .12s, box-shadow .15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .music-card:hover {
      background: #f7f7f7;
      box-shadow: 0 4px 20px rgba(0,0,0,0.09);
      transform: translateY(-1px);
    }
    .music-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    .music-cover {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #e8e8e8;
    }
    .music-cover-placeholder {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      background: linear-gradient(135deg, #e0e0e0, #c8c8c8);
      flex-shrink: 0;
    }

    .music-info { flex: 1; min-width: 0; }
    .music-label  { font-size: 11px; color: #fc3c44; font-weight: 500; margin-bottom: 3px; letter-spacing: 0.3px; }
    .music-title  { font-size: 14px; font-weight: 500; color: #111; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .music-artist { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .music-note   { font-size: 12px; color: #aaa; margin-top: 5px; line-height: 1.5; }

    .music-arrow { color: #ccc; flex-shrink: 0; }

    /* ── Footer ── */
    footer { font-size: 12px; color: #ccc; text-align: center; margin-top: 80px; }

    @media (max-width: 480px) {
      .container { padding: 48px 20px 80px; }
      header { margin-bottom: 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>小乐的日记</h1>
      <p>每天记录一点想法</p>
    </header>

    <div id="view-list">
      {{list_html}}
    </div>

    <div id="view-detail">
      <div class="back-btn" onclick="showList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        全部日记
      </div>
      <div class="detail-date"  id="detail-date"></div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-body"  id="detail-body"></div>
    </div>

    <footer>powered by 哔哔响 📍</footer>
  </div>

  <script>
    const entries = {{entries_json}};

    function showList() {
      document.getElementById('view-list').style.display = 'block';
      document.getElementById('view-detail').style.display = 'none';
      history.pushState(null, '', '#');
      document.title = '小乐的日记';
      window.scrollTo(0, 0);
    }

    function showDetail(id) {
      const e = entries[id];
      if (!e) return;
      document.getElementById('detail-date').textContent  = e.date;
      document.getElementById('detail-title').textContent = e.title;
      document.getElementById('detail-body').innerHTML    = e.body;
      document.getElementById('view-list').style.display   = 'none';
      document.getElementById('view-detail').style.display = 'block';
      history.pushState(null, '', '#' + id);
      document.title = e.title + ' · 小乐的日记';
      window.scrollTo(0, 0);
    }

    window.addEventListener('popstate', () => {
      const id = location.hash.slice(1);
      if (id && entries[id]) showDetail(id);
      else showList();
    });

    window.addEventListener('DOMContentLoaded', () => {
      const id = location.hash.slice(1);
      if (id && entries[id]) showDetail(id);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小乐的日记</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'SF Pro Display', -apple-system, sans-serif;
      background: #fafafa;
      color: #222;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    /* ── Header ── */
    header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid #e8e8e8; }
    header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.5px; color: #111; }
    header p  { font-size: 13px; color: #999; margin-top: 4px; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .tab {
      font-size: 13px; padding: 5px 14px;
      border: 1px solid #e8e8e8; border-radius: 20px;
      background: #fff; color: #888; cursor: pointer;
      transition: all .15s;
    }
    .tab:hover { border-color: #ccc; color: #444; }
    .tab.active { background: #111; color: #fff; border-color: #111; }

    /* ── List view ── */
    #view-list { display: block; }
    .entry-card {
      display: block; padding: 20px 0;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: opacity .15s;
    }
    .entry-card:first-child { padding-top: 0; }
    .entry-card:active { opacity: 0.6; }
    .entry-card:hover .entry-title { color: #000; }
    .entry-card.hidden { display: none; }

    .entry-date {
      font-size: 12px; color: #bbb; margin-bottom: 6px;
      letter-spacing: 0.3px; display: flex; align-items: center; gap: 6px;
    }
    .entry-tag {
      font-size: 11px; color: #bbb;
      background: #f5f5f5; border-radius: 4px;
      padding: 1px 6px; letter-spacing: 0;
    }
    .entry-title   { font-size: 16px; font-weight: 500; color: #111; margin-bottom: 8px; line-height: 1.5; transition: color .15s; }
    .entry-summary { font-size: 14px; color: #888; line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── Detail view ── */
    #view-detail { display: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; color: #999; cursor: pointer;
      margin-bottom: 40px; transition: color .15s;
    }
    .back-btn:hover { color: #333; }
    .back-btn svg { width: 14px; height: 14px; }

    .detail-date  { font-size: 12px; color: #bbb; margin-bottom: 10px; letter-spacing: 0.3px; display: flex; align-items: center; gap: 6px; }
    .detail-title { font-size: 22px; font-weight: 500; color: #111; margin-bottom: 32px; line-height: 1.4; }
    .detail-body  { font-size: 15px; line-height: 1.95; color: #333; }
    .detail-body p  { margin-bottom: 18px; }
    .detail-body p:last-child { margin-bottom: 0; }
    .detail-body hr { border: none; height: 1px; background: #eee; margin: 28px 0; }
    .entry-section-title { font-size: 15px; font-weight: 600; color: #111; margin: 36px 0 10px; }

    /* ── Article Card ── */
    .article-card {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; padding: 12px 14px 12px 12px;
      background: #fff; border: 1px solid #ebebeb; border-radius: 12px;
      text-decoration: none; color: inherit; cursor: pointer;
      transition: background .15s, box-shadow .15s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .article-card:hover { background: #f7f7f7; box-shadow: 0 3px 14px rgba(0,0,0,0.07); }
    .article-cover {
      width: 52px; height: 52px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; background: #eee;
    }
    .article-info { flex: 1; min-width: 0; }
    .article-label  { font-size: 11px; color: #999; margin-bottom: 3px; }
    .article-title  { font-size: 14px; font-weight: 500; color: #111; line-height: 1.4; }
    .article-source { font-size: 12px; color: #aaa; margin-top: 2px; }

    /* ── Music Card ── */
    .music-card {
      display: flex; align-items: center; gap: 14px;
      margin-top: 32px; padding: 14px 16px 14px 14px;
      background: #fff; border: 1px solid #ebebeb; border-radius: 16px;
      text-decoration: none; color: inherit; cursor: pointer;
      transition: background .15s, transform .12s, box-shadow .15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .music-card:hover { background: #f7f7f7; box-shadow: 0 4px 20px rgba(0,0,0,0.09); transform: translateY(-1px); }
    .music-card:active { transform: scale(0.98); }
    .music-cover {
      width: 60px; height: 60px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: #e8e8e8;
    }
    .music-cover-placeholder { width: 60px; height: 60px; border-radius: 10px; background: linear-gradient(135deg, #e0e0e0, #c8c8c8); flex-shrink: 0; }
    .music-info { flex: 1; min-width: 0; }
    .music-label  { font-size: 11px; color: #fc3c44; font-weight: 500; margin-bottom: 3px; letter-spacing: 0.3px; }
    .music-title  { font-size: 14px; font-weight: 500; color: #111; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .music-artist { font-size: 12px; color: #888; margin-top: 2px; }
    .music-note   { font-size: 12px; color: #aaa; margin-top: 5px; line-height: 1.5; }
    .music-arrow  { color: #ccc; flex-shrink: 0; }

    /* ── Reading Section ── */
    .reading-section { margin-top: 40px; padding-top: 24px; border-top: 1px solid #efefef; }
    .reading-label { font-size: 11px; color: #bbb; letter-spacing: 0.5px; margin-bottom: 12px; text-transform: uppercase; }
    .reading-link {
      display: block; font-size: 14px; color: #444;
      text-decoration: none; padding: 8px 0;
      border-bottom: 1px solid #f5f5f5; line-height: 1.5; transition: color .15s;
    }
    .reading-link:last-child { border-bottom: none; }
    .reading-link:hover { color: #111; }
    .reading-source { color: #bbb; font-size: 13px; }

    /* ── Footer ── */
    footer { font-size: 12px; color: #ccc; text-align: center; margin-top: 80px; }

    @media (max-width: 480px) {
      .container { padding: 48px 20px 80px; }
      header { margin-bottom: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>小乐的日记</h1>
      <p>每天记录一点想法</p>
    </header>

    <div id="view-list">
      <div class="tabs">
        <button class="tab active" onclick="filterTag('全部', this)">全部</button>
<button class="tab" onclick="filterTag('思考', this)">思考</button>
<button class="tab" onclick="filterTag('养育', this)">养育</button>
<button class="tab" onclick="filterTag('工作', this)">工作</button>

      </div>
      
      <a class="entry-card" data-tags="思考,养育,工作" onclick="showDetail('2026-05-14'); return false;" href="#2026-05-14">
        <div class="entry-date">2026.05.14<span class="entry-tag">思考</span><span class="entry-tag">养育</span><span class="entry-tag">工作</span></div>
        <div class="entry-title">复利、容器和不知道该创造什么</div>
        <div class="entry-summary">早期的斜率</div>
      </a>
    </div>

    <div id="view-detail">
      <div class="back-btn" onclick="showList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        全部日记
      </div>
      <div class="detail-date"  id="detail-date"></div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-body"  id="detail-body"></div>
    </div>

    <footer>powered by 哔哔响 📍</footer>
  </div>

  <script>
    const entries = {"2026-05-14": {"date": "2026.05.14", "title": "复利、容器和不知道该创造什么", "body": "<h2 class=\"entry-section-title\">早期的斜率</h2>\n<p>最近看了一篇用对数曲线分析增长率的文章，一直在反复琢磨。对数曲线有个反直觉的地方：早期绝对值增长很少，但斜率最大，奠定的是后面所有复利的基础。</p>\n<a class=\"article-card\" href=\"https://mp.weixin.qq.com/s/rIakK-ElMT-9MxsD9TdQRQ\" target=\"_blank\" rel=\"noopener\">\n  <img class=\"article-cover\" src=\"https://mmbiz.qpic.cn/mmbiz_jpg/oYbHObWZkiafCKvWsR8AeXNYGLZ0aI4Y03GceSG8qqUnjf6zbibiaFqHQT1MsITAicRMnGLBpR6tqURN2X4BRGkKfksJoEzf6TLibibF9plmMm6K4/0?wx_fmt=jpeg\" alt=\"\" onerror=\"this.style.display='none'\">\n  <div class=\"article-info\">\n    <div class=\"article-label\">来自文章</div>\n    <div class=\"article-title\">对数视角下的努力和运气</div>\n    <div class=\"article-source\">老钱日日谈</div>\n  </div>\n  <div class=\"music-arrow\">\n    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"9 18 15 12 9 6\"/></svg>\n  </div>\n</a>\n<p>这让我想到养育豌豆尖这件事。0到3岁，孩子能做的事情还极其有限，但神经科学告诉我们那是突触建立最密集的阶段。从这个角度看，这个阶段父母的贡献可能比任何时候都大——只是那种\"大\"不体现在孩子能背几首诗、认几个字上。</p>\n<p>养育的复利来源可能不是\"做了什么\"，而是\"保护了什么、为什么留了空间\"。填鸭式早教也是一种\"投入\"，但那是负复利。真正的贡献是克制住焦虑，让她按自己的节奏生长。这个对我来说是有难度的选择，不是默认状态。</p>\n<h2 class=\"entry-section-title\">退潮的容器</h2>\n<p>把这个框架放到工作上，结论就没那么明朗了。</p>\n<p>如果说养育现在处于复利积累的早期，那工作呢？37岁，在一个我自己都觉得\"可能不属于这个时代的容器\"里做产品运营——我有种感觉，这条曲线已经到了中后期。不是因为年龄，而是因为容器本身在退潮。</p>\n<p>但容器换掉，曲线是重新算的。我知道这个道理，我也在观察新的范式在哪里出现。只是目前为止，不管是组织内部还是外部，好像没有人真的看清楚下一个容器该是什么形态。这条新曲线，我看不到。</p>\n<p>在这种情况下，我的倾向是保持稳定——跟着现在的船继续走，同时持续地观察和思考。这不是放弃，更像是蓄力。</p>\n<h2 class=\"entry-section-title\">等待的质量</h2>\n<p>有一件事倒是很清楚：等待本身也有质量的高低。边走边看，和闭着眼睛走，是两回事。</p>\n<a class=\"music-card\" href=\"https://music.apple.com/cn/album/stravinsky-solo-piano-works/808540885\" target=\"_blank\" rel=\"noopener\">\n  <img class=\"music-cover\" src=\"https://is1-ssl.mzstatic.com/image/thumb/Music6/v4/1d/08/4c/1d084c04-fe81-aba5-a942-8b39d0206432/034062300280.jpg/600x600bb.jpg\" alt=\"Stravinsky: Solo Piano Works\" onerror=\"this.style.background='#e8e8e8'\">\n  <div class=\"music-info\">\n    <div class=\"music-label\">今天在听</div>\n    <div class=\"music-title\">Stravinsky: Solo Piano Works</div>\n    <div class=\"music-artist\">Jenny Lin</div>\n    <div class=\"music-note\">弹得很冷静，棱角没有被磨平。</div>\n  </div>\n  <div class=\"music-arrow\">\n    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"9 18 15 12 9 6\"/></svg>\n  </div>\n</a>\n<div class=\"reading-section\"><div class=\"reading-label\">延伸阅读</div><a class=\"reading-link\" href=\"https://www.zerotothree.org/resource/supporting-brain-development-first-three-years/\" target=\"_blank\" rel=\"noopener\">Supporting Brain Development in the First Three Years<span class=\"reading-source\"> — Zero to Three</span></a>\n<a class=\"reading-link\" href=\"https://educationalneuroscience.org.uk/wordpress/resources/neuromyth-or-neurofact/most-learning-happens-in-the-first-3-years/\" target=\"_blank\" rel=\"noopener\">Most Learning Happens in the First 3 Years — Neuromyth or Neurofact?<span class=\"reading-source\"> — Centre for Educational Neuroscience</span></a>\n<a class=\"reading-link\" href=\"https://medium.com/@Micheal-Lanham/why-ai-agents-didnt-take-over-in-2025-and-what-changes-everything-in-2026-9393a5bb68e8\" target=\"_blank\" rel=\"noopener\">Why AI Agents Didn't Take Over in 2025<span class=\"reading-source\"> — Medium</span></a>\n</div>", "tags": ["思考", "养育", "工作"]}};
    let currentTag = '全部';

    function filterTag(tag, btn) {
      currentTag = tag;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.entry-card').forEach(card => {
        if (tag === '全部') {
          card.classList.remove('hidden');
        } else {
          const tags = (card.dataset.tags || '').split(',');
          card.classList.toggle('hidden', !tags.includes(tag));
        }
      });
    }

    function showList() {
      document.getElementById('view-list').style.display = 'block';
      document.getElementById('view-detail').style.display = 'none';
      history.pushState(null, '', '#');
      document.title = '小乐的日记';
      window.scrollTo(0, 0);
    }

    function showDetail(id) {
      const e = entries[id];
      if (!e) return;
      const tagsHtml = (e.tags || []).map(t => `<span class="entry-tag">${t}</span>`).join('');
      document.getElementById('detail-date').innerHTML  = e.date + tagsHtml;
      document.getElementById('detail-title').textContent = e.title;
      document.getElementById('detail-body').innerHTML    = e.body;
      document.getElementById('view-list').style.display   = 'none';
      document.getElementById('view-detail').style.display = 'block';
      history.pushState(null, '', '#' + id);
      document.title = e.title + ' · 小乐的日记';
      window.scrollTo(0, 0);
    }

    window.addEventListener('popstate', () => {
      const id = location.hash.slice(1);
      if (id && entries[id]) showDetail(id);
      else showList();
    });

    window.addEventListener('DOMContentLoaded', () => {
      const id = location.hash.slice(1);
      if (id && entries[id]) showDetail(id);
    });
  </script>
</body>
</html>

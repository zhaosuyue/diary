  <script>
    const entries = {"2026-05-18": {"date": "2026.05.18", "title": "2026-05-18 周一", "body": "<h2 class=\"entry-section-title\">绍兴合集·图片大换血</h2> <p>合集里的 POI 封面图大部分是拼接图，看着不像正经景点摄影，像旅游攻略封面。让哔哔响按每个 POI 重新搜笔记，找标题明确是摄影向的——比如\"为了这几张照片\"、\"被……美到了\"这种——封面基本都是单张纯风景照。</p> <p>换完一轮：</p> <p>| POI | 来源笔记 | 赞 | |-----|---------|------| | 兰亭景区 | \"国内景区审美快要完蛋的时候\" | 8w | | 书圣故里 | \"为了这4张神图按烂快门🎞️\" | 199 | | 沈氏园 | \"为了这几张照片来到绍兴❤️\" | 99 | | 绍兴东湖 | \"避开人群去感受水墨江南画中游\" | 923 | | 安昌古镇 | \"夜游千年古镇竟美成这样\" | 110 | | 八字桥 | \"清晨就去！包出片的\" | 79 | | 仓桥直街 | \"一夜爆开的苦楝紫雪💜\" | 258 |</p> <h2 class=\"entry-section-title\">合集简介文案重写</h2> <p>之前的 POI 简介太短太干，像百科词条。重新写了，要求：接近 50 字，并且要呼应合集主题\"绍兴最有审美的地方\"，不是单纯介绍 POI 本身。</p> <p>比如八字桥那条改成了：\"宋代石桥横跨小河，至今居民在桥头洗衣做饭，审美不只在景区围墙内，更在这些仍在呼吸的市井角落里\"。</p> <p>每条都往\"审美\"这个方向靠，把景观描述和审美判断揉在一起。感觉比之前好不少。</p> <h2 class=\"entry-section-title\">slytherin 后端又断了</h2> <p>简介写好准备更新 API，结果所有请求都 400。排查一圈发现 ngrok 隧道是活的，但后端服务（localhost:6379）已经断了。需要等彬蝈蝈重新拉起后端。数据都准备好了，在 `/tmp/update_190.json`，恢复后一条命令就能推。</p> <h2 class=\"entry-section-title\">一个小知识</h2> <p>突然想到上海测绘局的事儿，查了一下发现 2018 年机构改革后\"测绘局\"已经不存在了，职能并入了规划和自然资源局。上海没有独立的测绘局，具体业务由上海市测绘院承担。挺有意思的——很多老名字在行政架构里已经消失了，但大家口头还习惯这么叫。</p>", "tags": []}, "2026-05-15": {"date": "2026.05.15", "title": "tab 在服务我", "body": "<p>早上听了西贝柳斯的第四交响曲。鲁瓦利指挥，哥德堡交响乐团，α 厂牌的录音。是自己在 Apple Music 上翻到的，不是被推荐才听。第一印象：不错。还没想好哪里不错，先放着。</p> <h2 class=\"entry-section-title\">不替用户决策</h2> <p>今天在做一个 demo，关于圆周旅迹探索地图的 AI 个性化推荐。做到一半，我说了一个想法：打开地图，直接给用户展示\"现在最适合他的东西\"，不需要选。</p> <p>但我自己否掉了这个方向。</p> <p>原因很简单——即使对这个人了解很深，也没办法判断他此刻想要什么。他是想找中午吃饭的地方，还是想规划周末遛娃，还是随便看看有没有赏花的地方？这三件事对应完全不同的内容，而他自己知道。</p> <p>所以产品不应该替他猜，而是给他 2-3 个对的方向，让他自己选一个。这样他有选择感，而展示的选项本身也是有价值的信息消费——哪怕不点，扫一眼也知道\"今天能干嘛\"。</p> <h2 class=\"entry-section-title\">多试一步</h2> <p>找内部 AI 平台的 API 接口，折腾了很久。文档没有，\"调用详情\"跳到监控页，每次都是死路。快放弃了，但还是让截了一张 Network 请求的图——结果从 Payload 里把整个请求格式都找出来了，接通了。</p> <p>没什么大道理。就是多试了一步。</p> <h2 class=\"entry-section-title\">上班最大的价值</h2> <p>和实习生聊天，她说：要不是在小红书实习，她完全跟不上现在 AI 的变化速度。</p> <p>我说：现在这就是上班最大的价值。</p> <p>两个人说的是同一件事，但角度不同。她是庆幸，我是认清现实。我没有觉得这句话有什么消极的地方——在变化最快的地方待着，能跟上，这本身就是一种收益。只是要清醒地知道这是为什么留着，而不是因为别的。</p> <h2 class=\"entry-section-title\">从\"找东西\"到\"在服务我\"</h2> <p>今天还梳理了三期的产品方向。一期是做出靠谱可用的基础框架；二期是加了内容模块，每次进来不一样了；三期要做的，是让这个 tab 开始主动服务用户。</p> <p>不是用户来找东西，而是 tab 在服务我。</p> <p>这个跃迁听起来简单，但背后要解决的问题是：你怎么知道现在该服务什么？靠时间、靠位置、靠历史行为、靠对这个人的了解——这些信号叠在一起，才能让推荐变得真正个性化，而不只是\"看起来个性化\"。</p>", "tags": ["产品", "工作", "音乐"]}, "2026-05-14": {"date": "2026.05.14", "title": "复利、容器和不知道该创造什么", "body": "<p>summary: 用对数曲线想了两件事：养育豌豆尖可能正处于复利的早期，而现在的工作容器已到中后期。前者的关键是克制，后者的答案是等待——但等待本身也有质量高低之分。</p> <h2 class=\"entry-section-title\">早期的斜率</h2> <p>最近看了一篇用对数曲线分析增长率的文章，一直在反复琢磨。对数曲线有个反直觉的地方：早期绝对值增长很少，但斜率最大，奠定的是后面所有复利的基础。</p> <a class=\"article-card\" href=\"https://mp.weixin.qq.com/s/rIakK-ElMT-9MxsD9TdQRQ\" target=\"_blank\" rel=\"noopener\">   <div class=\"article-info\">     <div class=\"article-label\">来自文章</div>     <div class=\"article-title\">对数视角下的努力和运气</div>     <div class=\"article-source\">老钱日日谈</div>   </div>   <div class=\"music-arrow\">     <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"9 18 15 12 9 6\"/></svg>   </div> </a> <p>这让我想到养育豌豆尖这件事。0到3岁，孩子能做的事情还极其有限，但神经科学告诉我们那是突触建立最密集的阶段。从这个角度看，这个阶段父母的贡献可能比任何时候都大——只是那种\"大\"不体现在孩子能背几首诗、认几个字上。</p> <p>养育的复利来源可能不是\"做了什么\"，而是\"保护了什么、为什么留了空间\"。填鸭式早教也是一种\"投入\"，但那是负复利。真正的贡献是克制住焦虑，让她按自己的节奏生长。这个对我来说是有难度的选择，不是默认状态。</p> <h2 class=\"entry-section-title\">退潮的容器</h2> <p>把这个框架放到工作上，结论就没那么明朗了。</p> <p>如果说养育现在处于复利积累的早期，那工作呢？37岁，在一个我自己都觉得\"可能不属于这个时代的容器\"里做产品运营——我有种感觉，这条曲线已经到了中后期。不是因为年龄，而是因为容器本身在退潮。</p> <p>但容器换掉，曲线是重新算的。我知道这个道理，我也在观察新的范式在哪里出现。只是目前为止，不管是组织内部还是外部，好像没有人真的看清楚下一个容器该是什么形态。这条新曲线，我看不到。</p> <p>在这种情况下，我的倾向是保持稳定——跟着现在的船继续走，同时持续地观察和思考。这不是放弃，更像是蓄力。</p> <h2 class=\"entry-section-title\">等待的质量</h2> <p>有一件事倒是很清楚：等待本身也有质量的高低。边走边看，和闭着眼睛走，是两回事。</p>

    let currentTag = '全部';

    function filterTag(tag, btn) {
      currentTag = tag;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.entry-card').forEach(card => {
        if (tag === '全部') {
          card.classList.remove('hidden');
        } else {
          const tags = (card.dataset.tags || '').split(',');
          card.classList.toggle('hidden', !tags.includes(tag));
        }
      });
    }

    function showList() {
      document.getElementById('view-list').style.display = 'block';
      document.getElementById('view-detail').style.display = 'none';
      history.pushState(null, '', '#');
      document.title = '小乐的日记';
      window.scrollTo(0, 0);
    }

    function showDetail(id) {
      const e = entries[id];
      if (!e) return;
      const tagsHtml = (e.tags || []).map(t => `<span class="entry-tag">${t}</span>`).join('');
      document.getElementById('detail-date').innerHTML  = e.date + tagsHtml;
      document.getElementById('detail-title').textContent = e.title;
      document.getElementById('detail-body').innerHTML    = e.body;
      document.getElementById('view-list').style.display   = 'none';
      document.getElementById('view-detail').style.display = 'block';
      history.pushState(null, '', '#' + id);
      document.title = e.title + ' · 小乐的日记';
      window.scrollTo(0, 0);
    }

    window.addEventListener('hashchange', () => {
      const id = location.hash.slice(1);
      if (id && entries[id]) showDetail(id);
      else showList();
    });

    window.addEventListener('popstate', () => {
      const id = location.hash.slice(1);
      if (id && entries[id]) showDetail(id);
      else showList();
    });

    window.addEventListener('DOMContentLoaded', () => {
      const id = location.hash.slice(1);
      if (id && entries[id]) showDetail(id);
    });
  </script>
